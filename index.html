<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDP Chart - Search Any Country (Live API)</title>
    <link rel="stylesheet" href="main.css">
    <script>
        // Simple password protection for Fiverr demos
        const PASSWORD = "demo2024";
        const userPass = prompt("🔒 Demo Access\n\nContact taha95-dev on Fiverr for password:");
        
        if (userPass !== PASSWORD) {
            document.body.innerHTML = `
                <div style="text-align:center;margin-top:100px;font-family:Arial">
                    <h1>🔒 Access Denied</h1>
                    <p>This demo is for authorized clients only.</p>
                    <p>📧 Contact <strong>taha95-dev</strong> on Fiverr</p>
                    <p style="color:#666;margin-top:50px">Professional graphing solutions available</p>
                </div>
            `;
            throw new Error("Unauthorized access");
        }
    </script>
<body>
    <div class="chart-container">
        <h1>📊 GDP by Country (Current US$)</h1>
        <div class="subtitle">Search any country — Live data from World Bank API</div>
        
        <div class="controls">
            <div class="search-box">
                <input type="text" id="countrySearch" placeholder="Start typing a country name (e.g., Pakistan, Brazil, Nigeria)" autocomplete="off">
                <div id="suggestions" class="suggestions"></div>
            </div>
            <button id="loadBtn">Load GDP Data</button>
        </div>

        <div class="chart-type-buttons">
            <button id="barBtn" class="active">📊 Bar Chart</button>
            <button id="lineBtn">📈 Line Chart</button>
            <button id="pieBtn">🥧 Pie Chart</button>
        </div>

        <canvas id="gdpChart"></canvas>
        <div id="loading" class="loading">🌍 Fetching GDP data from World Bank...</div>
        <div id="errorMsg" class="error"></div>
        <div id="countryInfo" class="country-info"></div>
        <div id="statusBadge" class="status-badge"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <script src="code.js"></script>
</body>
</html>
